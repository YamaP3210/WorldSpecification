<svg xmlns="http://www.w3.org/2000/svg" width="900" height="900" viewBox="0 0 900 900">
  <rect width="900" height="900" fill="#ffffff"/>

  <!-- center construction line -->
  <line x1="450" y1="120" x2="450" y2="780" stroke="#b8b8b8" stroke-width="2" stroke-dasharray="8 8"/>

  <!-- blade outline: single-edged, left side is the edge, right side is the spine -->
  <path d="
    M 415 555
    Q 406 500 402 430
    Q 398 330 404 255
    Q 412 175 445 115
    Q 470 145 476 230
    Q 480 315 478 420
    Q 476 500 480 555
    Z"
    fill="none"
    stroke="#111111"
    stroke-width="4"
    stroke-linejoin="round"
    stroke-linecap="round"/>

  <!-- guard -->
  <path d="
    M 330 555
    Q 390 548 450 548
    Q 510 548 570 555"
    fill="none"
    stroke="#111111"
    stroke-width="8"
    stroke-linecap="round"/>

  <!-- grip / tang line -->
  <path d="
    M 450 555
    L 450 715"
    fill="none"
    stroke="#111111"
    stroke-width="10"
    stroke-linecap="round"/>

  <!-- simple pommel guide -->
  <ellipse cx="450" cy="742" rx="24" ry="18" fill="none" stroke="#111111" stroke-width="6"/>

  <!-- notes -->
  <text x="260" y="220" font-family="Arial, sans-serif" font-size="22" fill="#444444">edge</text>
  <line x1="320" y1="214" x2="395" y2="214" stroke="#444444" stroke-width="2"/>

  <text x="515" y="250" font-family="Arial, sans-serif" font-size="22" fill="#444444">spine ~5mm</text>
  <line x1="505" y1="244" x2="478" y2="244" stroke="#444444" stroke-width="2"/>
</svg>
