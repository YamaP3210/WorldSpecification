<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <rect width="640" height="360" fill="#ffffff"/>

  <!-- construction cross -->
  <line x1="120" y1="40" x2="120" y2="300" stroke="#9aa0a6" stroke-width="1.5"/>
  <line x1="85" y1="220" x2="155" y2="220" stroke="#9aa0a6" stroke-width="1.5"/>

  <!-- blade centerline -->
  <path d="M120 220
           Q122 182 129 142
           Q137 96 154 50" fill="none" stroke="#b0b6bc" stroke-width="1.2" stroke-dasharray="4 4"/>

  <!-- blade outline: single-edged, gentle outward curve -->
  <path d="M112.5 220
           Q114.5 184 120 146
           Q127 100 142 58
           Q145 50 154 50
           Q149 63 146 91
           Q142 129 139 170
           Q137 196 127.5 220 Z"
        fill="none" stroke="#111111" stroke-width="2.2" stroke-linejoin="round"/>

  <!-- simple edge/spine markers -->
  <text x="164" y="108" font-family="Arial, sans-serif" font-size="12" fill="#444444">edge</text>
  <line x1="150" y1="104" x2="176" y2="104" stroke="#444444" stroke-width="1"/>

  <text x="66" y="132" font-family="Arial, sans-serif" font-size="12" fill="#444444">spine</text>
  <line x1="94" y1="128" x2="120" y2="128" stroke="#444444" stroke-width="1"/>

  <text x="166" y="224" font-family="Arial, sans-serif" font-size="12" fill="#444444">base width ~3cm</text>
  <text x="166" y="240" font-family="Arial, sans-serif" font-size="12" fill="#444444">blade length ~35cm</text>
</svg>
